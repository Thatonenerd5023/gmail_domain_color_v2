<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gmail Domain Colorizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 300px;
      padding: 12px;
      background: #fff;
      color: #222;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    #overrides-list {
      margin-bottom: 10px;
      max-height: 220px;
      overflow-y: auto;
    }
    .override-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .override-row span {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .override-row input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px;
      cursor: pointer;
    }
    .override-row button {
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
    }
    .override-row button:hover { color: #c00; }
    #add-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    #add-row input[type="text"] {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    #add-row input[type="color"] {
      width: 36px;
      height: 28px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }
    #add-btn {
      padding: 4px 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #add-btn:hover { background: #1558b0; }
    #status {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      min-height: 14px;
    }
    .empty-msg { color: #999; font-style: italic; font-size: 12px; padding: 4px 0; }
  </style>
</head>
<body>
  <h2>Domain Color Overrides</h2>
  <div id="overrides-list"></div>
  <div id="add-row">
    <input type="text" id="new-domain" placeholder="e.g. github.com" />
    <input type="color" id="new-color" value="#cfe2ff" />
    <button id="add-btn">Add</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
